<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CISO RegBro</title>
  <link rel="icon" type="image/png" href="ciso.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="search-bar">
    <img src="ciso.png" alt="" class="brand-logo" />
    <span class="brand-name"><span class="brand-prefix">CISO</span>Reg<span class="brand-name-accent">Bro</span></span>
    <span class="brand-divider" aria-hidden="true"></span>
    <div class="search-wrapper">
      <label for="searchInput" class="sr-only">Search</label>
      <input id="searchInput" type="search" placeholder="Search articles or keywords..." autocomplete="off" />
    </div>
    <img src="dbg_logo.svg" alt="Deutsche Börse Group" class="dbg-logo" />
  </div>

  <main class="page-content">
    <div class="layout">
      <aside class="side-panel" aria-label="Article navigation">
        <div class="side-panel-inner">
          <button type="button" id="collapseAllButton" class="collapse-all-button" hidden>
            <span class="collapse-all-icon" aria-hidden="true"></span>
            Collapse
          </button>
          <p id="listMessage" class="list-message"></p>
          <nav class="article-list" aria-label="Articles">
            <ul id="articleList"></ul>
          </nav>
        </div>
      </aside>

      <section class="article-content">
        <div id="statusMessage" class="status-message" role="status" aria-live="polite"></div>
        <header class="article-header">
          <nav class="breadcrumb" id="breadcrumb" aria-label="Breadcrumb"></nav>
          <div class="article-number-row">
            <span id="articleNumber" class="article-number-chip"></span>
          </div>
          <h2 id="articleTitle" class="article-title" tabindex="-1"></h2>
          <p id="articleSubtitle" class="article-subtitle"></p>
        </header>
        <div id="paragraphsContainer" class="paragraphs"></div>
        <nav class="article-navigation" aria-label="Article pagination">
          <button id="prevArticle" type="button" class="nav-button" aria-label="View previous article">Previous</button>
          <button id="nextArticle" type="button" class="nav-button" aria-label="View next article">Next</button>
        </nav>
      </section>
    </div>
  </main>

  <footer class="page-footer">
    <p>Data sourced from consolidated legal texts published on <a href="https://eur-lex.europa.eu" target="_blank">EUR-Lex</a>.<span class="footer-version">v0.1</span></p>
  </footer>

  <script src="app.js" defer></script>
</body>
</html>
